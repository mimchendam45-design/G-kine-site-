<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><title>Connexion Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
<form method="POST" class="bg-white p-8 rounded-xl shadow-lg w-96">
  <h2 class="text-2xl font-bold text-center mb-6 text-teal-700">Connexion Admin</h2>
  <input type="password" name="password" placeholder="Mot de passe" class="w-full p-3 mb-4 border rounded-lg" required>
  <button class="w-full bg-teal-600 text-white py-3 rounded-lg font-bold">Se connecter</button>
</form>
</body>
</html>
